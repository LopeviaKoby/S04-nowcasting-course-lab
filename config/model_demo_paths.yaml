cascast_repo: ../codigo_github/Repo_CasCast
# Checkpoints descargados con: python scripts/download_assets.py --checkpoints
checkpoints:
  earthformer: checkpoints/ef_ideam_final/ef_ckpt.pth
  autoencoder: checkpoints/ef_ideam_final/ae_ckpt.pth
  diffusion: checkpoints/ef_ideam_final/diff_ckpt.pth
max_rain: 60.0
input_frames: 13
pred_frames: 12
ddim_steps: 20
# Factor de escala latente con el que se entreno la difusion CasCast.
# Fijarlo aqui hace que CasCast sea reproducible y no dependa del batch.
scale_factor: 0.702658
# auto = CUDA si existe, si no CPU. Tambien puedes usar cpu o cuda.
device: auto
